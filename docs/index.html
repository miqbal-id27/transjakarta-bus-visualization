<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Jakarta Public Bus Interconnectivity and Coverage</title>
    <style>
      /* Main layout container */
      #content {
        border: 2px solid;
        width: 1100px;
        height: 650px;
        text-align: center;
        position: absolute;
        top: 0;
        bottom: 0;
        left: 0;
        right: 0;
        margin: auto;
      }

      /* Sidebar section for title/guide/insights */
      #side-bar {
        float: left;
        background-color: lightgrey;
        box-sizing: border-box;
        width: 300px;
        height: 650px;
        padding: 20px;
        text-align: left;
        font-size: 14px;
        font-family: sans-serif;
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
      }

      /* Paragraph styling */
      p {
        font-size: 12px;
      }

      /* Data source */
      #data-source {
        font-size: 10px;
        color: blue;
        margin-top: auto;
      }

      /* SVG canvas container */
      #canvas {
        margin-left: 300px;
      }

      /* Default styling for links (edges) */
      .link {
        stroke: #ccc;
      }

      /* Styling for all nodes */
      .node {
        stroke: #fff;
        stroke-width: 1.5px;
        cursor: grab;
      }
      .node:active {
        cursor: grabbing;
      }

      /* Tooltip container styling */
      #tooltip {
        position: absolute;
        background-color: white;
        border: 1px solid #999;
        padding: 6px;
        font-size: 11px;
        font-family: sans-serif;
        pointer-events: none;
        display: none;
        white-space: pre-line;
        max-width: 240px;
        text-align: left;
      }
    </style>
  </head>
  <body>
    <div id="content">
      <div id="side-bar">
        <h2>Jakarta Public Bus Interconnectivity and Coverage</h2>
        <p>Select a bus stop on the map or from the dropdown below to view:</p>
        <label for="stop-filter">Bus Stop Selection:</label>
        <select id="stop-filter"></select>
        <svg id="line-chart" width="260" height="150" style="margin:10px 0"></svg>
        <svg id="pyramid-chart" width="260" height="200"></svg>
        <p id="data-source">
          Data source:
          <a href="https://www.kaggle.com/datasets/dikisahkan/transjakarta-transportation-transaction"
            target="_blank" rel="noopener noreferrer">
          TransJakarta Trips
          </a>
          &amp;
          <a href="https://satudata.jakarta.go.id/open-data/detail?kategori=dataset&amp;page_url=data-lokasi-transjakarta-dki-jakarta&amp;data_no=1"
            target="_blank" rel="noopener noreferrer">
            Bus Stops Data
            </a>
        </p>
      </div>
      <div id="canvas"></div>
      <div id="tooltip"></div>
    </div>

    <!-- Load D3 -->
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script type="module">
      import { feature } from "https://unpkg.com/topojson-client@3?module";

      const canvasWidth = 800;
      const canvasHeight = 650;
      const defaultRadius = 6;
      const tooltip = d3.select("#tooltip");
      
      const svg = d3
        .select("#canvas")
        .append("svg")
        .attr("width", canvasWidth)
        .attr("height", canvasHeight);

      const zoomGroup = svg.append("g");
      svg.call(
        d3.zoom().scaleExtent([0.1, 4]).on("zoom", (event) =>
          zoomGroup.attr("transform", event.transform)
        )
      );

      // dragging behavior
      function drag(sim) {
        return d3
          .drag()
          .on("start", (e, d) => {
            d.fx = d.x;
            d.fy = d.y;
          })
          .on("drag", (e, d) => {
            d.fx = e.x;
            d.fy = e.y;
            sim.alpha(0.1).restart();
          })
          .on("end", (e, d) => {
            d.fx = d.x;
            d.fy = d.y;
            sim.alpha(0);
          });
      }

      // Keep Track of Selection
      let selectedStop = null;

      // Load JSONs
      Promise.all([
        d3.json("data/bus_stop_network.json"),
        d3.json("data/bus_stop_timeseries.json"),
        d3.json("data/bus_stop_population.json"),
        d3.json("data/jakarta-simplified-topo.json")
      ]).then(([network, tsData, popData, jakartaTopo]) => {
        const { nodes, edges } = network;
        renderMap(nodes, edges, jakartaTopo);
        initSidebar(tsData, popData, nodes);
        updateSidebar(nodes[0].name);
      });

      function renderMap(nodes, edges, jakartaTopo) {
            // convert to GeoJSON
            const jk = feature(jakartaTopo, jakartaTopo.objects.jakarta);
            // set up a projection that fits canvas
            const projection = d3.geoMercator()
                .fitSize([canvasWidth, canvasHeight], jk);
            const path = d3.geoPath().projection(projection);

            // draw the outline of Jakarta
            zoomGroup.append("path")
                .datum(jk)
                .attr("d", path)
                .attr("fill", "#f0f0f0")
                .attr("stroke", "#999");
        
        // corridor color + legend
        const corridors = [...new Set(nodes.map(d => d.corridor))].sort();
        const color = d3.scaleOrdinal(d3.schemeCategory10).domain(corridors);

        const legendG = svg.append("g")
          .attr("transform", `translate(${canvasWidth - 230},20)`);

        // Background Box
        legendG.append("rect")
            .attr("width", 225)
            .attr("height", corridors.length * 20 + 30)
            .attr("rx", 6)
            .attr("ry", 6)
            .attr("fill", "gray")
            .attr("opacity", 0.3);

        // Legend Title
        legendG.append("text")
            .attr("x", 10)
            .attr("y", 18)
            .text("Corridor Legend")
            .attr("font-size", "14px")
            .attr("font-weight", "bold")
            .attr("fill", "black");

        // Items
        corridors.forEach((c,i) => {
          legendG.append("rect")
            .attr("x",10)
            .attr("y",25 + i*20)
            .attr("width",12)
            .attr("height",12)
            .attr("fill", color(c));
          legendG.append("text")
            .attr("x",30)
            .attr("y",25 + i *20+10)
            .text(`Corridor ${c}`)
            .attr("font-size","9px")
            .attr("fill", "black");
        });

        const link = zoomGroup.append("g")
          .selectAll("line")
          .data(edges)
          .join("line")
            .attr("class","link")
            .attr("stroke-width", d => Math.sqrt(d.weight))
            .attr("x1", d => {
                const s = nodes.find(n => n.id === d.source);
                return projection([s.lon, s.lat])[0];
            })
            .attr("y1", d => {
                const s = nodes.find(n => n.id === d.source);
                return projection([s.lon, s.lat])[1];
            })
            .attr("x2", d => {
                const s = nodes.find(n => n.id === d.target);
                return projection([s.lon, s.lat])[0];
            })
            .attr("y2", d => {
                const s = nodes.find(n => n.id === d.target);
                return projection([s.lon, s.lat])[1];
            });

        const node = zoomGroup.append("g")
          .selectAll("circle")
          .data(nodes)
          .join("circle")
            .attr("class","node")
            .attr("r", defaultRadius)
            .attr("fill", d => color(d.corridor))
            .attr("cx", d => projection([d.lon, d.lat])[0])
            .attr("cy", d => projection([d.lon, d.lat])[1])
            .on("mouseover", (e,d) => {
              tooltip
                .style("display","block")
                .html(`
                  <strong>Bus Stop Name: </strong>${d.name}<br>
                  <strong>Corridor: </strong> ${d.corridor}<br>
                  <strong>Built: </strong> ${d.built_year||"n/a"}<br>
                  <strong>Current Infrastructure: </strong>${d.remarks}
                `)
                .style("left", (e.pageX+10)+"px")
                .style("top",  (e.pageY+10)+"px");
            })
            .on("mouseout", () => tooltip.style("display","none"))
            .on("click", (e,d) => {
                // Toggle Selection
                if (selectedStop === d.name) {
                    selectedStop = null;
                    d3.select("#stop-filter").property("value","");
                    updateSidebar(null);
                } else {
                    selectedStop = d.name;
                    d3.select("#stop-filter").property("value", d.name);
                    updateSidebar(d.name);
                }
            });
      }

      function initSidebar(tsData, popData, nodes) {
        // populate dropdown
        const sel = d3.select("#stop-filter");
        sel.append("option").attr("value","").text("All Stops");
        sel.selectAll("option")
          .data(nodes.map(d=>d.name).sort())
          .join("option")
            .attr("value", d=>d)
            .text(d=>d)
          .on("change", () => updateSidebar(sel.property("value")));

        window._tsData = tsData;
        window._popData = popData;
      }

      function updateSidebar(id) {
        let dataTs, dataPop;
        if (!id) {
            dataTs  = window._tsData;
            dataPop = window.popData;
        } else {
            dataTs  = window._tsData.filter(d => d.id === id);
            dataPop = window._popData.filter(d => d.id === id); 
        }
        drawLineChart(dataTs);
        drawPyramid(dataPop);
      }

      function drawLineChart(data) {
        const svg = d3.select("#line-chart");
        svg.selectAll("*").remove();
        const margin = {top:20, right:20, bottom:30, left:40};
        const w = +svg.attr("width") - margin.left - margin.right;
        const h = +svg.attr("height") - margin.top - margin.bottom;
        const g = svg.append("g")
          .attr("transform", `translate(${margin.left},${margin.top})`);
        const parseDate = d3.timeParse("%Y-%m-%d");
        data.forEach(d => d.date = parseDate(d.date));
        const x = d3.scaleTime().domain(d3.extent(data,d=>d.date)).range([0,w]);
        const y = d3.scaleLinear().domain([0,d3.max(data,d=>d.count)]).nice().range([h,0]);
        const color = d3.scaleOrdinal().domain(["Weekday","Weekend"]).range(["steelblue","tomato"]);
        g.append("g").attr("transform",`translate(0,${h})`).call(d3.axisBottom(x).ticks(5));
        g.append("g").call(d3.axisLeft(y).ticks(4));
        const line = d3.line().x(d=>x(d.date)).y(d=>y(d.count));
        const nested = d3.group(data,d=>d.weekday);
        for (const [key, vals] of nested) {
          g.append("path")
            .datum(vals)
            .attr("fill","none")
            .attr("stroke", color(key))
            .attr("stroke-width", 1.5)
            .attr("d", line);
        }
      }

      function drawPyramid(data) {
        const svg = d3.select("#pyramid-chart");
        svg.selectAll("*").remove();
        const margin = {top:20, right:20, bottom:20, left:50};
        const w = +svg.attr("width") - margin.left - margin.right;
        const h = +svg.attr("height") - margin.top - margin.bottom;
        const g = svg.append("g")
          .attr("transform", `translate(${margin.left},${margin.top})`);
        const ageGroups = [...new Set(data.map(d=>d.age_grp))];
        const popM = data.filter(d=>d.sex==="M");
        const popF = data.filter(d=>d.sex==="F");
        const y = d3.scaleBand().domain(ageGroups).range([0,h]).padding(0.1);
        const x = d3.scaleLinear()
          .domain([
            -d3.max(popM,d=>d.pop),
             d3.max(popF,d=>d.pop)
          ]).range([0,w]);
        g.append("g").call(d3.axisLeft(y));
        g.append("g")
          .attr("transform",`translate(0,${h})`)
          .call(d3.axisBottom(x).ticks(3).tickFormat(d=>Math.abs(d)));
        g.selectAll(".barM")
          .data(popM)
          .join("rect")
            .attr("class","barM")
            .attr("x", d=>x(-d.pop))
            .attr("y", d=>y(d.age_grp))
            .attr("width", d=>x(0)-x(-d.pop))
            .attr("height", y.bandwidth())
            .attr("fill","steelblue");
        g.selectAll(".barF")
          .data(popF)
          .join("rect")
            .attr("class","barF")
            .attr("x", x(0))
            .attr("y", d=>y(d.age_grp))
            .attr("width", d=>x(d.pop)-x(0))
            .attr("height", y.bandwidth())
            .attr("fill","tomato");
      }
    </script>
  </body>
</html>
